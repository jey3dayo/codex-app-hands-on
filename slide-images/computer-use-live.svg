  <rect width="1200" height="720" rx="36" fill="url(#bg)"/>
  <rect x="86" y="84" width="1028" height="552" rx="30" fill="#020617" stroke="#334155" stroke-width="3"/>
  <rect x="118" y="120" width="964" height="70" rx="20" fill="#111827"/>
