<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Codex App hands-on workflow</title>
  <desc id="desc">A five step workflow from design policy to implementation, browser check, diff review, and goal loop.</desc>
  <defs>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="36" fill="#0f172a"/>
  <path d="M150 360 H1050" stroke="url(#line)" stroke-width="14" stroke-linecap="round"/>
  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(90 210)">
      <circle cx="60" cy="150" r="58" fill="#0ea5e9"/>
      <text x="60" y="158" text-anchor="middle" font-size="34" fill="white" font-weight="700">1</text>
      <text x="60" y="255" text-anchor="middle" font-size="26" fill="#e2e8f0" font-weight="700">DESIGN.md</text>
      <text x="60" y="292" text-anchor="middle" font-size="20" fill="#94a3b8">方針を渡す</text>
    </g>
    <g transform="translate(315 210)">
      <circle cx="60" cy="150" r="58" fill="#6366f1"/>
      <text x="60" y="158" text-anchor="middle" font-size="34" fill="white" font-weight="700">2</text>
      <text x="60" y="255" text-anchor="middle" font-size="26" fill="#e2e8f0" font-weight="700">Prompt</text>
      <text x="60" y="292" text-anchor="middle" font-size="20" fill="#94a3b8">作業を渡す</text>
    </g>
    <g transform="translate(540 210)">
      <circle cx="60" cy="150" r="58" fill="#8b5cf6"/>
      <text x="60" y="158" text-anchor="middle" font-size="34" fill="white" font-weight="700">3</text>
      <text x="60" y="255" text-anchor="middle" font-size="26" fill="#e2e8f0" font-weight="700">Build</text>
      <text x="60" y="292" text-anchor="middle" font-size="20" fill="#94a3b8">実装する</text>
    </g>
    <g transform="translate(765 210)">
      <circle cx="60" cy="150" r="58" fill="#14b8a6"/>
      <text x="60" y="158" text-anchor="middle" font-size="34" fill="white" font-weight="700">4</text>
      <text x="60" y="255" text-anchor="middle" font-size="26" fill="#e2e8f0" font-weight="700">Browser</text>
      <text x="60" y="292" text-anchor="middle" font-size="20" fill="#94a3b8">画面を見る</text>
    </g>
    <g transform="translate(990 210)">
      <circle cx="60" cy="150" r="58" fill="#f59e0b"/>
      <text x="60" y="158" text-anchor="middle" font-size="34" fill="white" font-weight="700">5</text>
      <text x="60" y="255" text-anchor="middle" font-size="26" fill="#e2e8f0" font-weight="700">Review</text>
      <text x="60" y="292" text-anchor="middle" font-size="20" fill="#94a3b8">95点まで直す</text>
    </g>
  </g>
</svg>
